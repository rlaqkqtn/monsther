<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 몬스터 다마고치 펫 v4</title>
    <style>
        body {
            background-color: #2c3e50;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            user-select: none;
        }
        .tamagotchi-case {
            background: radial-gradient(circle, #e91e63 60%, #880e4f 100%);
            width: 380px;
            padding: 35px 25px;
            border-radius: 120px / 150px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5), inset 0 -6px 18px rgba(0,0,0,0.4);
            border: 8px solid #880e4f;
            text-align: center;
            position: relative;
        }
        .lcd-screen {
            background-color: #c8e6c9;
            width: 280px;
            height: 240px;
            margin: 0 auto 15px auto;
            border-radius: 12px;
            border: 16px solid #222;
            box-shadow: inset 4px 4px 12px rgba(0,0,0,0.6);
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }
        .screen-header {
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #333;
            padding-bottom: 2px;
        }
        .view-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* 살아 움직이는 도트 애니메이션 정의 */
        .monster-sprite {
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .monster-sprite:active { transform: scale(0.9) !important; }
        
        .stage-유년기 { width: 38px; height: 38px; animation: breathe 0.5s infinite alternate; }
        .stage-성장기 { width: 60px; height: 60px; animation: bounce 0.7s infinite alternate; }
        .stage-완전체 { width: 88px; height: 88px; animation: FloatMove 1.3s infinite alternate; }
        
        .egg-sprite {
            width: 45px; height: 55px;
            background: linear-gradient(135deg, #ab47bc, #e1bee7);
            border: 3px solid #222;
            border-radius: 50% 50% 43% 43%;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2);
            animation: wobble 0.6s infinite alternate;
            cursor: pointer;
        }

        .dead-sprite { font-size: 55px; animation: ghost 2s infinite ease-in-out; cursor: pointer; }

        @keyframes wobble { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.1, 0.95); } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        @keyframes FloatMove { 0% { transform: translateY(0) translateX(-4px); } 100% { transform: translateY(-7px) translateX(4px); } }
        @keyframes ghost { 0% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-12px); opacity: 1; } 100% { transform: translateY(0); opacity: 0.7; } }

        .poop-area { position: absolute; bottom: 5px; right: 10px; display: flex; gap: 4px; }
        .poop { width: 14px; height: 14px; background-color: #795548; border-radius: 50% 50% 20% 20%; border: 1px solid #222; }
        
        /* 타이밍 훈련 게이지 전용 UI */
        .training-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 10px;}
        .gauge-bar { width: 200px; height: 16px; background: #eee; border: 2px solid #222; position: relative; border-radius: 4px; overflow: hidden; }
        .target-zone { position: absolute; top: 0; height: 100%; background: #4caf50; }
        .target-perfect { position: absolute; top: 0; height: 100%; background: #ffeb3b; width: 15px; }
        .cursor { position: absolute; top: 0; width: 6px; height: 100%; background: #f44336; left: 0; }

        .status-text { font-size: 11px; font-weight: bold; margin-top: 2px; height: 15px; text-align: center; }
        
        .buttons-row { display: flex; justify-content: center; gap: 30px; margin-top: 10px; }
        .btn {
            width: 52px; height: 52px; background-color: #f8bbd0; border-radius: 50%;
            border: 3px solid #c2185b; box-shadow: 0 4px 0 #c2185b; cursor: pointer;
            font-weight: bold; font-size: 15px; display: flex; align-items: center; justify-content: center;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #c2185b; }
        
        .panel {
            background: rgba(255,255,255,0.96); margin-top: 15px; padding: 12px;
            border-radius: 12px; font-size: 12px; text-align: left; display: none;
            max-height: 240px; overflow-y: auto; box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            border: 2px solid #222;
        }
        .active-panel { display: block; }
        .flex-space { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        input[type="text"] { width: 65%; padding: 4px; font-size: 11px; border: 2px solid #333; }
        button { cursor: pointer; padding: 4px 10px; font-size: 11px; font-weight: bold; border: 2px solid #333; background: #fff; }
        button:active { background: #eee; }
        
        .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .book-item { padding: 6px; border: 2px solid #444; text-align: center; background: #e0e0e0; font-size: 10px; font-weight: bold; border-radius: 4px; overflow: hidden;}
    </style>
</head>
<body>

<div class="tamagotchi-case">
    <div class="lcd-screen">
        <div class="screen-header">
            <span id="display-stage">알</span>
            <span id="display-injury" style="color: #d32f2f; font-weight: bold;"></span>
            <span id="display-type">TYPE</span>
        </div>
        
        <div class="view-area" id="view-area">
            <div class="egg-sprite" id="egg-element" onclick="hatchEgg()"></div>
            <div class="poop-area" id="poop-container"></div>
        </div>
        
        <div class="status-text" id="status-line">알을 클릭하여 부화시키세요!</div>
    </div>

    <div class="buttons-row">
        <button class="btn" onclick="pressButton('A')">A</button>
        <button class="btn" onclick="pressButton('B')">B</button>
        <button class="btn" onclick="pressButton('C')">C</button>
    </div>
    <div style="display:flex; justify-content:space-around; font-size:11px; color:white; margin-top:6px; font-weight:bold;">
        <span>메뉴(A)</span><span>선택/훈련(B)</span><span>취소(C)</span>
    </div>

    <div class="panel" id="panel-status">
        <h3>📊 몬스터 상태정보</h3>
        <div class="flex-space"><span>이름:</span> <b id="stat-name">-</b></div>
        <div class="flex-space"><span>고유 번호:</span> <span id="stat-code" style="font-weight: bold; color:#880e4f;">-</span></div>
        <div class="flex-space"><span>🥩 포만감:</span> <b id="stat-hungry">0 / 4</b></div>
        <div class="flex-space"><span>💪 공격력:</span> <b id="stat-str">0</b></div>
        <div class="flex-space"><span>❤️ 체력:</span> <b id="stat-hp">0</b></div>
        <div class="flex-space"><span>⚡ 스피드:</span> <b id="stat-spd">0</b></div>
        <div class="flex-space"><span>🧬 상성속성:</span> <b id="stat-type">-</b></div>
        <div class="flex-space" style="color:#00796b;"><span>🏋️ 훈련 횟수:</span> <b id="stat-train-count">0 회</b></div>
        <div class="flex-space" id="injury-count-row" style="color:red; display:none;"><span>⚠️ 부상 패배 스택:</span> <b id="stat-injury-count">0</b></div>
        <hr style="border: 1px dashed #333;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;" id="care-buttons-area">
            <button onclick="feedMonster()" style="background:#ffb74d;">🍖 고기 먹이기</button>
            <button onclick="cleanPoop()" style="background:#81c784;">🧹 똥 치우기</button>
            <button onclick="healMonster()" style="background:#e57373; grid-column: span 2;">🩹 부상 치료하기</button>
        </div>
        <button onclick="forceResetGame()" id="reset-button" style="background:#b0bec5; width:100%; margin-top:5px; display:none;">🔄 새로운 알 부화하기 (리셋)</button>
    </div>

    <div class="panel" id="panel-train">
        <h3>🏋️ 타이밍 훈련 시설</h3>
        <p style="margin:0 0 5px 0; font-size:11px; color:#444;">B 버튼을 눌러 노란색/초록색 타겟 존에 바를 멈추세요!</p>
        <div class="training-container">
            <div class="gauge-bar">
                <div class="target-zone" style="left: 60px; width: 80px;"></div>
                <div class="target-perfect" style="left: 95px;"></div>
                <div class="cursor" id="train-cursor"></div>
            </div>
            <button onclick="toggleTraining()" id="train-control-btn" style="margin-top: 10px; width: 100%; background: #ffeb3b;">훈련 개시 / 타이밍 멈추기</button>
        </div>
        <div id="train-result-log" style="margin-top:8px; font-weight:bold; font-size:12px; text-align:center; color:#e91e63;"></div>
    </div>

    <div class="panel" id="panel-battle">
        <h3>⚔️ 패스워드 대전</h3>
        <p style="margin:0 0 8px 0; font-size:11px; color:#555;">성장기부터 가능합니다. (부상 방치 시 사망 위험)</p>
        <div style="margin-bottom:8px;">
            <button onclick="generateBattleCode()" style="background:#64b5f6; width: 100%;">내 대전 패스워드 복사하기</button>
        </div>
        <div class="flex-space">
            <input type="text" id="opponent-code" placeholder="상대방 패스워드 입력">
            <button onclick="startBattle()" style="background:#ff8a65;">대전 시작</button>
        </div>
        <div id="battle-log" style="margin-top:8px; border:1px solid #333; background:#fff; padding:5px; font-size:11px; max-height:60px; overflow-y:auto;"></div>
    </div>

    <div class="panel" id="panel-book">
        <h3>📖 신종 발견 도감 (60종)</h3>
        <div class="book-grid" id="book-grid-area"></div>
    </div>
</div>

<script>
    // --- [!] 디버그 모드 설정 (true: 진화 속도 10초/15초 변경, false: 실제 시간인 3분/5분 적용) ---
    const DEBUG_MODE = false; 

    // --- 1. 가상 데이터베이스 구조 구축 (60종) ---
    const MONSTER_DB = {};
    const types = ["백신", "데이터", "바이러스"]; // 상성 구조: 백신 > 바이러스 > 데이터 > 백신

    const namesSeed = [
        "네오코어","셀가드","기가펄스","아쿠아쉘","루멘윙","비트클로","크로노혼","파이로팡","바이트체인","볼트나이트",
        "제피르링","타이탄스파이크","미스틱혼","가이아테일","쉐도우블레이드","옴니플러그","레이저이빨","나노가드","포톤날개","디스크쉘"
    ];

    for(let i = 0; i < 60; i++) {
        let baseName = namesSeed[i % namesSeed.length];
        MONSTER_DB[i] = {
            code: "DM-" + String(i + 1).padStart(2, '0'),
            유년기: { name: "베비" + (i + 1) + "몬", str: 7, hp: 40, spd: 6, type: types[i % 3] },
            성장기: [
                { name: baseName + "몬", str: 18 + (i%4), hp: 90 + (i%10), spd: 15 + (i%3), type: types[(i+1)%3] }, // 만복 루트 (조건 우수)
                { name: "헝그리" + baseName + "몬", str: 14 + (i%3), hp: 75 + (i%12), spd: 19 + (i%2), type: types[(i+2)%3] } // 굶주림 루트
            ],
            완전체: [
                { name: "마스터" + baseName + "몬", str: 55 + (i%8), hp: 240 + (i%20), spd: 42 + (i%5), type: types[(i+2)%3] }, // 훈련 10회 이상 대성공형
                { name: "스포일" + baseName + "몬", str: 42 + (i%6), hp: 190 + (i%35), spd: 35 + (i%4), type: types[i%3] }  // 훈련 부족 낙제형
            ]
        };
    }

    // --- 2. 라이브 상태 데이터 객체 (훈련 변수 포함) ---
    let gameState = {
        hasEgg: true,
        isHatched: false,
        isDead: false,
        minuteId: 0,
        stage: "알", 
        branchIndex: 0,
        name: "디지타마",
        code: "EGG",
        str: 0, hp: 0, maxHp: 0, spd: 0, type: "NONE",
        hungry: 4,
        poopCount: 0,
        isInjured: false,
        injuredDefeatCount: 0, 
        starvingTicks: 0,      
        trainCount: 0,         // 성장기 동안 쌓은 훈련 누적 스택 (규칙 19)
        starveExperience: 0,   // 유년기 시절 굶은 횟수 가중치 스택 (규칙 19)
        lastEvolvedTime: null,
        unlockedMonsters: []
    };

    // UI 메뉴 인덱서 (A키 순환)
    let currentPanelIdx = -1;
    const panels = ["panel-status", "panel-train", "panel-battle", "panel-book"];

    // 미니게임 제어용 변수
    let trainInterval = null;
    let cursorPosition = 0;
    let cursorDirection = 1;
    let isTrainingActive = false;

    window.onload = function() {
        loadGame();
        renderDOM();
        updateBookUI();
        setInterval(gameBackgroundTick, 5000); // 5초 백그라운드 코어 감시 루프
    };

    function saveGame() { localStorage.setItem("tamagotchi_v4_save", JSON.stringify(gameState)); }
    function loadGame() {
        const saved = localStorage.getItem("tamagotchi_v4_save");
        if(saved) {
            try { gameState = JSON.parse(saved); } catch(e) { console.log("세이브 복구 에러"); }
        }
    }

    // --- 3. 실시간 관리 루프 (포만도 감시 기능 보완) ---
    function gameBackgroundTick() {
        if (!gameState.isHatched || gameState.isDead) return;

        if (Math.random() < 0.3 && gameState.hungry > 0) {
            gameState.hungry--;
        }

        // 규칙 19 진화 분기를 위한 기록 장치: 유년기일 때 배고픔이 절반 미만(1칸 이하)이면 패널티 스택 적체
        if (gameState.stage === "유년기" && gameState.hungry <= 1) {
            gameState.starveExperience++;
        }

        if (gameState.hungry === 0) {
            gameState.starvingTicks++;
            if (gameState.starvingTicks >= 6) { 
                triggerDeath("아사 (만복도 0 상태 지속 장기 방치)");
                return;
            }
        } else {
            gameState.starvingTicks = 0;
        }

        if (Math.random() < 0.2 && gameState.poopCount < 4) {
            gameState.poopCount++;
        }

        checkEvolution();
        saveGame();
        renderDOM();
    }

    // --- 4. 3분 / 5분 타임스케일 정밀 진화 처리 (규칙 17, 19) ---
    function hatchEgg() {
        if (!gameState.hasEgg || gameState.isHatched || gameState.isDead) return;
        const currentMinute = new Date().getMinutes();
        
        gameState.hasEgg = false;
        gameState.isHatched = true;
        gameState.isDead = false;
        gameState.minuteId = currentMinute;
        gameState.stage = "유년기";
        gameState.lastEvolvedTime = Date.now();
        gameState.hungry = 4;
        gameState.trainCount = 0;
        gameState.starveExperience = 0;
        gameState.injuredDefeatCount = 0;
        
        applyMonsterData(MONSTER_DB[currentMinute].유년기);
        saveGame();
        renderDOM();
        updateBookUI();
    }

    function applyMonsterData(data) {
        gameState.name = data.name;
        gameState.code = MONSTER_DB[gameState.minuteId].code;
        gameState.str = data.str;
        gameState.maxHp = data.hp;
        gameState.hp = data.hp;
        gameState.spd = data.spd;
        gameState.type = data.type;
        
        if(!gameState.unlockedMonsters.includes(data.name)) {
            gameState.unlockedMonsters.push(data.name);
        }
    }

    function checkEvolution() {
        if (!gameState.isHatched || gameState.stage === "완전체" || gameState.isDead) return;

        const elapsed = Date.now() - gameState.lastEvolvedTime;
        
        // 규칙 17: 진화 타임 테이블 밸런싱 (성장기까지 3분, 완전체까지 5분)
        let requiredTime = gameState.stage === "유년기" ? 180000 : 300000; 
        if(DEBUG_MODE) requiredTime = gameState.stage === "유년기" ? 10000 : 15000; // 디버그 편의 스위치

        if (elapsed >= requiredTime) {
            let branch = 0;

            if (gameState.stage === "유년기") {
                // 규칙 19: 만복 상태를 잘 유지(배고팠던 스택이 2회 이하)했는가 기준 분기
                branch = (gameState.starveExperience > 2) ? 1 : 0;
                gameState.stage = "성장기";
                gameState.branchIndex = branch;
                applyMonsterData(MONSTER_DB[gameState.minuteId].성장기[branch]);
            } else if (gameState.stage === "성장기") {
                // 규칙 19: 성장기 동안 미니게임 훈련을 10번 완수했는지 기준 분기
                branch = (gameState.trainCount >= 10) ? 0 : 1;
                gameState.stage = "완전체";
                gameState.branchIndex = branch;
                applyMonsterData(MONSTER_DB[gameState.minuteId].완전체[branch]);
            }

            gameState.lastEvolvedTime = Date.now();
            saveGame();
            renderDOM();
            updateBookUI();
            alert(`🎉 몬스터가 진화 조건에 따라 [${gameState.stage}]인 [${gameState.name}](으)로 진화했습니다!`);
        }
    }

    // --- 5. 타이밍 기반 미니게임 훈련 시설 코어 (규칙 18) ---
    function toggleTraining() {
        if(gameState.isDead || !gameState.isHatched) return;
        
        if(!isTrainingActive) {
            // 미니게임 기동
            isTrainingActive = true;
            cursorPosition = 0;
            cursorDirection = 2; // 커서 속도 가중치
            document.getElementById("train-result-log").innerText = "집중하세요...!";
            
            trainInterval = setInterval(() => {
                cursorPosition += cursorDirection;
                if(cursorPosition >= 194 || cursorPosition <= 0) {
                    cursorDirection *= -1; // 벽에 부딪히면 튕김
                }
                document.getElementById("train-cursor").style.left = cursorPosition + "px";
            }, 10);
        } else {
            // 타이밍 브레이크 피드백 연산
            clearInterval(trainInterval);
            isTrainingActive = false;
            
            let power = "MISS";
            let strGain = 0;
            
            // 중앙 좌표 오차 픽셀 판정 연산
            if(cursorPosition >= 92 && cursorPosition <= 108) {
                power = "🔥 PERFECT! 강공격 발동!";
                strGain = 4;
            } else if(cursorPosition >= 75 && cursorPosition <= 125) {
                power = "✨ GREAT! 중간 공격 발동!";
                strGain = 2;
            } else if(cursorPosition >= 60 && cursorPosition <= 140) {
                power = "⚡ GOOD. 약한 공격 발동.";
                strGain = 1;
            } else {
                power = "💨 MISS... 훈련 실패";
            }
            
            if(strGain > 0) {
                gameState.str += strGain;
                gameState.trainCount++; // 누적 성공 훈련 카운터 증폭
            }
            
            document.getElementById("train-result-log").innerText = `${power} (공격력 +${strGain})`;
            saveGame();
            renderDOM();
        }
    }

    // --- 6. 다마고치 기본 생활 인터랙션 ---
    function touchMonster() {
        if(gameState.isDead) return;
        const expressions = ["🥰 훈련을 즐거워합니다!", "🎵 도트가 기쁘게 요동칩니다.", "🍖 배고픈지 스탯창을 확인해 보세요."];
        document.getElementById("status-line").innerText = expressions[Math.floor(Math.random() * expressions.length)];
    }

    function feedMonster() {
        if(gameState.isDead || gameState.hungry >= 4) return;
        gameState.hungry = Math.min(4, gameState.hungry + 1);
        document.getElementById("status-line").innerText = "🍖 고기 급여 완료! 만복도가 올랐습니다.";
        saveGame();
        renderDOM();
    }

    function cleanPoop() {
        if(gameState.poopCount === 0) return;
        gameState.poopCount = 0;
        document.getElementById("status-line").innerText = "🧹 액정 청소로 환경이 깨끗해졌습니다.";
        saveGame();
        renderDOM();
    }

    function healMonster() {
        if(!gameState.isInjured) return;
        gameState.isInjured = false;
        document.getElementById("status-line").innerText = "🩹 부상 치료가 완벽히 완료되었습니다.";
        saveGame();
        renderDOM();
    }

    // --- 7. 대전 통신 패스워드 트랜스레이터 (부상 조건 결부 규칙 10, 16) ---
    function generateBattleCode() {
        if(gameState.isDead || gameState.stage === "유년기") return alert("배틀은 성장기 단계부터 가능합니다.");
        const pack = `${gameState.name}|${gameState.str}|${gameState.maxHp}|${gameState.spd}|${gameState.type}`;
        navigator.clipboard.writeText(btoa(encodeURIComponent(pack)));
        alert("📋 복사된 배틀 패스워드 코드를 친구에게 전달해 주세요!");
    }

    function startBattle() {
        if(gameState.isDead || gameState.stage === "유년기") return;
        const code = document.getElementById("opponent-code").value.trim();
        if(!code) return;

        try {
            const unpack = decodeURIComponent(atob(code)).split("|");
            const [opName, opStr, opMaxHp, opSpd, opType] = unpack;

            let myHp = gameState.maxHp;
            if(gameState.isInjured) { myHp = Math.floor(myHp * 0.8); } // 규칙 10: 부상 시 체력 20% 패널티 상태 돌입
            let enHp = parseInt(opMaxHp);

            let log = document.getElementById("battle-log");
            log.innerHTML = "⚔️ 전투 스타트!<br>";

            // 상성 비교 연산 (백신 > 바이러스 > 데이터 > 백신)
            let dmgMod = 1.0;
            if((gameState.type === "백신" && opType === "바이러스") ||
               (gameState.type === "바이러스" && opType === "데이터") ||
               (gameState.type === "데이터" && opType === "백신")) {
                dmgMod = 1.35;
                log.innerHTML += "⭐ 속성 카운터 판정 우세!<br>";
            } else if(gameState.type !== opType) { dmgMod = 0.75; }

            let turn = (gameState.spd >= parseInt(opSpd)) ? "ME" : "ENEMY";
            let loop = 0;
            while(myHp > 0 && enHp > 0 && loop < 15) {
                loop++;
                if(turn === "ME") { enHp -= Math.floor(gameState.str * dmgMod); turn = "ENEMY"; }
                else { myHp -= Math.floor(parseInt(opStr)); turn = "ME"; }
            }

            if(myHp > enHp) {
                log.innerHTML += `🏆 승리! [${opName}]에게 이겼습니다.`;
            } else {
                log.innerHTML += `💀 패배... [${opName}]에게 졌습니다.`;
                
                // 규칙 16: 부상 조건 충족 패배 카운터 증가 감시식
                if(gameState.isInjured) {
                    gameState.injuredDefeatCount++;
                    if(gameState.stage === "성장기" && gameState.injuredDefeatCount >= 3) {
                        triggerDeath("성장기 부상 방치 배틀 3회 패배"); return;
                    } else if(gameState.stage === "완전체" && gameState.injuredDefeatCount >= 5) {
                        triggerDeath("완전체 부상 방치 배틀 5회 패배"); return;
                    }
                }

                if(!gameState.isInjured && Math.random() < 0.6) {
                    gameState.isInjured = true;
                    log.innerHTML += `<br>⚠️ 부상을 당했습니다! 다음 배틀 전 치료 필수!`;
                }
            }
            saveGame(); renderDOM();
        } catch(e) { alert("올바르지 않은 패스워드 형식입니다."); }
    }

    function triggerDeath(reason) {
        gameState.isDead = true; gameState.isHatched = false;
        gameState.stage = "사망"; gameState.name = "무덤"; gameState.code = "DEAD";
        gameState.isInjured = false; gameState.poopCount = 0;
        saveGame(); renderDOM();
        alert(`💀 [경고] 몬스터가 사망했습니다. 사유: ${reason}`);
    }

    function forceResetGame() {
        if(confirm("몬스터를 처음부터 다시 키우시겠습니까?")) {
            gameState.hasEgg = true; gameState.isHatched = false; gameState.isDead = false;
            gameState.stage = "알"; gameState.name = "디지타마"; gameState.code = "EGG";
            gameState.hungry = 4; gameState.poopCount = 0; gameState.isInjured = false;
            gameState.injuredDefeatCount = 0; gameState.starvingTicks = 0; gameState.trainCount = 0; gameState.starveExperience = 0;
            saveGame(); renderDOM(); pressButton('C');
        }
    }

    // --- 8. 도감 버그 원천 수정판 인터페이스 (규칙 11 전수 정렬) ---
    function updateBookUI() {
        const grid = document.getElementById("book-grid-area");
        grid.innerHTML = "";
        
        for(let i = 0; i < 60; i++) {
            const list = [
                MONSTER_DB[i].유년기.name,
                MONSTER_DB[i].성장기[0].name, MONSTER_DB[i].성장기[1].name,
                MONSTER_DB[i].완전체[0].name, MONSTER_DB[i].완전체[1].name
            ];

            list.forEach(mName => {
                const isOpened = gameState.unlockedMonsters.indexOf(mName) !== -1;
                const cell = document.createElement("div");
                cell.className = "book-item";
                if(isOpened) {
                    cell.innerText = mName;
                    cell.style.backgroundColor = "#fff";
                    cell.style.color = "#c2185b";
                } else {
                    cell.innerText = "???";
                    cell.style.color = "#aaa";
                }
                grid.appendChild(cell);
            });
        }
    }

    // --- 9. 물리식 키 스위칭 라우터 ---
    function pressButton(key) {
        // 미니게임 실행 중 B 버튼 조작 가로채기 (규칙 18용)
        if(key === 'B' && currentPanelIdx === 1 && isTrainingActive) {
            toggleTraining();
            return;
        }

        if(key === 'A') {
            currentPanelIdx = (currentPanelIdx + 1) >= panels.length ? 0 : currentPanelIdx + 1;
            panels.forEach(p => document.getElementById(p).classList.remove("active-panel"));
            document.getElementById(panels[currentPanelIdx]).classList.add("active-panel");
            document.getElementById("status-line").innerText = `메뉴: ${panels[currentPanelIdx].replace('panel-', '').toUpperCase()}`;
        } else if(key === 'B') {
            if(gameState.stage === "알") hatchEgg();
            else touchMonster();
        } else if(key === 'C') {
            if(isTrainingActive) { clearInterval(trainInterval); isTrainingActive = false; }
            currentPanelIdx = -1;
            panels.forEach(p => document.getElementById(p).classList.remove("active-panel"));
            document.getElementById("status-line").innerText = "다마고치 대기 화면";
        }
    }

    // --- 10. 고유 도트 비주얼 파이프라인 형성 ---
    function renderDOM() {
        document.getElementById("display-stage").innerText = gameState.stage;
        document.getElementById("display-type").innerText = gameState.type;
        document.getElementById("display-injury").innerText = gameState.isInjured ? "🩹부상" : "";
        
        const poopBox = document.getElementById("poop-container");
        poopBox.innerHTML = "";
        for(let p = 0; p < gameState.poopCount; p++) {
            const pDiv = document.createElement("div"); pDiv.className = "poop"; poopBox.appendChild(pDiv);
        }

        const view = document.getElementById("view-area");
        view.innerHTML = ""; view.appendChild(poopBox);

        if(gameState.isDead) {
            const grave = document.createElement("div"); grave.className = "dead-sprite"; grave.innerText = "💀";
            view.appendChild(grave);
            document.getElementById("status-line").innerText = "몬스터가 잠들었습니다. (리셋버튼)";
            document.getElementById("care-buttons-area").style.display = "none";
            document.getElementById("reset-button").style.display = "block";
            document.getElementById("injury-count-row").style.display = "none";
            return;
        } else {
            document.getElementById("care-buttons-area").style.display = "grid";
            document.getElementById("reset-button").style.display = "block";
        }

        if(gameState.stage === "알") {
            const egg = document.createElement("div"); egg.className = "egg-sprite"; egg.onclick = hatchEgg;
            view.appendChild(egg);
            document.getElementById("status-line").innerText = "알을 터치하여 부화시키기!";
            document.getElementById("injury-count-row").style.display = "none";
        } else {
            const mon = document.createElement("div"); mon.className = `monster-sprite stage-${gameState.stage}`;
            mon.onclick = touchMonster;
            
            const hue = (gameState.minuteId * 6) % 360;
            mon.style.background = `radial-gradient(circle at 35% 35%, hsl(${hue}, 85%, 65%), hsl(${hue}, 95%, 40%))`;
            mon.style.border = "3px solid #222";
            mon.style.boxShadow = `5px 5px 0 rgba(0,0,0,0.2), inset -4px -4px 0 rgba(0,0,0,0.3)`;
            mon.style.borderRadius = gameState.branchIndex === 1 ? "15% 65% 20% 60%" : "50%";
            mon.innerHTML = `<div style="position:absolute; top:25%; left:25%; width:6px; height:6px; background:#fff; border-radius:50%;"></div>
                             <div style="position:absolute; top:25%; left:65%; width:6px; height:6px; background:#fff; border-radius:50%;"></div>`;
            
            view.appendChild(mon);

            if(gameState.isInjured && gameState.stage !== "유년기") {
                document.getElementById("injury-count-row").style.display = "flex";
                document.getElementById("stat-injury-count").innerText = `${gameState.injuredDefeatCount} 회`;
            } else { document.getElementById("injury-count-row").style.display = "none"; }
        }

        // 텍스트 실시간 동기화 바인딩
        document.getElementById("stat-name").innerText = gameState.name;
        document.getElementById("stat-code").innerText = gameState.code;
        document.getElementById("stat-hungry").innerText = "🍖 ".repeat(gameState.hungry) + "⚪ ".repeat(4 - gameState.hungry);
        document.getElementById("stat-str").innerText = gameState.str;
        document.getElementById("stat-hp").innerText = `${gameState.hp} / ${gameState.maxHp}`;
        document.getElementById("stat-spd").innerText = gameState.spd;
        document.getElementById("stat-type").innerText = gameState.type;
        document.getElementById("stat-train-count").innerText = `${gameState.trainCount} 회`;
    }
</script>
